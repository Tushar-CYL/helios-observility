apiVersion: 1

# HELIOS V1 — Grafana datasource provisioning.
# Wires the four backends so the stack is queryable the moment it boots.
datasources:
  - name: Mimir
    type: prometheus
    uid: helios-mimir
    access: proxy
    url: http://mimir:9009/prometheus
    isDefault: true
    jsonData:
      httpMethod: POST
      timeInterval: 15s

  - name: Loki
    type: loki
    uid: helios-loki
    access: proxy
    url: http://loki:3100

  - name: Tempo
    type: tempo
    uid: helios-tempo
    access: proxy
    url: http://tempo:3200
    jsonData:
      tracesToLogsV2:
        datasourceUid: helios-loki
      tracesToMetrics:
        datasourceUid: helios-mimir

  - name: ClickHouse
    type: grafana-clickhouse-datasource
    uid: helios-clickhouse
    access: proxy
    jsonData:
      host: clickhouse
      port: 9000
      protocol: native
      username: helios
      defaultDatabase: helios
    secureJsonData:
      password: helios
