# HELIOS V1 — Mimir (metrics) monolithic mode, filesystem storage.
multitenancy_enabled: false

server:
  http_listen_port: 9009
  grpc_listen_port: 9097
  log_level: warn

common:
  storage:
    backend: filesystem
    filesystem:
      dir: /data/mimir

blocks_storage:
  backend: filesystem
  filesystem:
    dir: /data/mimir/blocks
  bucket_store:
    sync_dir: /data/mimir/tsdb-sync
  tsdb:
    dir: /data/mimir/tsdb

compactor:
  data_dir: /data/mimir/compactor

ruler_storage:
  backend: filesystem
  filesystem:
    dir: /data/mimir/ruler

ingester:
  ring:
    replication_factor: 1

store_gateway:
  sharding_ring:
    replication_factor: 1

limits:
  compactor_blocks_retention_period: 168h # 7 days
